<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Blueprint</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h1>App Blueprint</h1>
    <p class="hello-label">Hello World</p>

    <div class="panel">
      <button id="click-count-button" class="action-button" type="button">Click</button>
      <button id="reset-click-count-button" class="action-button" type="button">Reset Click Count</button>
      <p class="value-label">Current time: <span id="current-time">--:--:--</span></p>
      <p class="value-label">Click output: <span id="click-output">(none yet)</span></p>
    </div>

    <script type="module" src="./renderer.js"></script>
  </body>
</html>
