name: Release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
permissions:
  contents: write
  actions: read
jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Yarn 1
        run: corepack prepare yarn@1.22.22 --activate
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version
        id: bump
        run: |
          npm version "${{ github.event.inputs.release_type }}" -m "chore(release): %s"
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Push commit and tag
        run: |
          git push
          git push --tags
  build-installers:
    needs: bump-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_script: dist:linux:deb
          - os: windows-latest
            build_script: dist:win
          - os: macos-latest
            build_script: dist:mac
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump-version.outputs.tag }}
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Yarn 1
        run: corepack prepare yarn@1.22.22 --activate
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Resolve macOS signing inputs
        id: macos-signing
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_P12_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          CERT_BASE64="$APPLE_CERTIFICATE_P12_BASE64"
          CERT_PASSWORD="$APPLE_CERTIFICATE_P12_PASSWORD"

          if [ -z "$CERT_BASE64" ] && [ -n "$CSC_LINK" ]; then
            CERT_BASE64="$CSC_LINK"
          fi

          if [ -z "$CERT_PASSWORD" ] && [ -n "$CSC_KEY_PASSWORD" ]; then
            CERT_PASSWORD="$CSC_KEY_PASSWORD"
          fi

          if [ -z "$CERT_BASE64" ] || [ -z "$CERT_PASSWORD" ] || [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo 'Missing macOS signing/notarization secrets. Configure APPLE_CERTIFICATE_P12_BASE64 (or CSC_LINK), APPLE_CERTIFICATE_P12_PASSWORD (or CSC_KEY_PASSWORD), APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, and APPLE_TEAM_ID.'
            exit 1
          fi

          echo "cert_base64=$CERT_BASE64" >> "$GITHUB_OUTPUT"
          echo "cert_password=$CERT_PASSWORD" >> "$GITHUB_OUTPUT"
      - name: Prepare macOS signing
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ steps.macos-signing.outputs.cert_base64 }}
          APPLE_CERTIFICATE_P12_PASSWORD: ${{ steps.macos-signing.outputs.cert_password }}
        run: |
          CERT_PATH="$RUNNER_TEMP/apple-signing-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-blueprint-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24 | tr -d '\n')"

          CERT_PATH="$CERT_PATH" APPLE_CERTIFICATE_P12_BASE64="$APPLE_CERTIFICATE_P12_BASE64" python - <<'PY'
          import base64
          import os
          from pathlib import Path

          cert_path = Path(os.environ['CERT_PATH'])
          cert_bytes = base64.b64decode(os.environ['APPLE_CERTIFICATE_P12_BASE64'])
          cert_path.write_bytes(cert_bytes)
          PY
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
          EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '"')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
      - name: Build installers
        if: matrix.os != 'macos-latest'
        run: yarn ${{ matrix.build_script }}
      - name: Build installers (macOS)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: yarn ${{ matrix.build_script }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.os }}
          path: release/**
          if-no-files-found: error
  publish-release:
    needs:
      - bump-version
      - build-installers
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${{ github.run_id }}" --repo "${{ github.repository }}" --dir artifacts
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.bump-version.outputs.tag }}"
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 || gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes

          LINUX_FILE="$(find artifacts -type f -iname '*.deb' | head -n 1)"
          WINDOWS_FILE="$(find artifacts -type f -iname '*setup*.exe' | head -n 1)"
          MAC_FILE="$(find artifacts -type f -iname '*.dmg' | head -n 1)"

          [ -n "$LINUX_FILE" ] || { echo 'Missing Linux deb'; find artifacts -type f; exit 1; }
          [ -n "$WINDOWS_FILE" ] || { echo 'Missing Windows Setup EXE'; find artifacts -type f; exit 1; }
          [ -n "$MAC_FILE" ] || { echo 'Missing macOS DMG'; find artifacts -type f; exit 1; }
          mkdir -p release-upload
          LINUX_ASSET="release-upload/App.Blueprint-${VERSION}-linux.deb"
          WINDOWS_ASSET="release-upload/App.Blueprint-${VERSION}-windows.exe"
          MAC_ASSET="release-upload/App.Blueprint-${VERSION}-macos.dmg"

          cp "$LINUX_FILE" "$LINUX_ASSET"
          cp "$WINDOWS_FILE" "$WINDOWS_ASSET"
          cp "$MAC_FILE" "$MAC_ASSET"

          gh release upload "$TAG" "$LINUX_ASSET" --repo "$REPO" --clobber
          gh release upload "$TAG" "$WINDOWS_ASSET" --repo "$REPO" --clobber
          gh release upload "$TAG" "$MAC_ASSET" --repo "$REPO" --clobber
