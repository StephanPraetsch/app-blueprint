name: Release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
permissions:
  contents: write
  actions: read
jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Yarn 1
        run: corepack prepare yarn@1.22.22 --activate
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version
        id: bump
        run: |
          npm version "${{ github.event.inputs.release_type }}" -m "chore(release): %s"
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Push commit and tag
        run: |
          git push
          git push --tags
  build-installers:
    needs: bump-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_script: dist:linux:deb
          - os: windows-latest
            build_script: dist:win
          - os: macos-latest
            build_script: dist:mac
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump-version.outputs.tag }}
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Yarn 1
        run: corepack prepare yarn@1.22.22 --activate
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build installers
        run: yarn ${{ matrix.build_script }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.os }}
          path: release/**
  prepare-release:
    needs: bump-version
    runs-on: ubuntu-latest
    steps:
      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.bump-version.outputs.tag }}"
          REPO="${{ github.repository }}"
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 || gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes
  publish-release:
    needs:
      - bump-version
      - build-installers
      - prepare-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: installers-ubuntu-latest
            find_pattern: '*.deb'
            asset_os: linux
            asset_ext: deb
          - os: windows-latest
            artifact_name: installers-windows-latest
            find_pattern: '*setup*.exe'
            asset_os: windows
            asset_ext: exe
          - os: macos-latest
            artifact_name: installers-macos-latest
            find_pattern: '*.dmg'
            asset_os: macos
            asset_ext: dmg
    steps:
      - name: Download OS artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${{ github.run_id }}" "${{ matrix.artifact_name }}" --repo "${{ github.repository }}" --dir artifacts
      - name: Upload OS installer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.bump-version.outputs.tag }}"
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"
          FILE="$(find artifacts -type f -iname "${{ matrix.find_pattern }}" | head -n 1)"
          [ -n "$FILE" ] || { echo "Missing installer matching ${{ matrix.find_pattern }}"; find artifacts -type f; exit 1; }
          ASSET_NAME="App.Blueprint-${VERSION}-${{ matrix.asset_os }}.${{ matrix.asset_ext }}"
          gh release upload "$TAG" "$FILE#$ASSET_NAME" --repo "$REPO" --clobber
