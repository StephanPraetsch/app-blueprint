name: Release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
permissions:
  contents: write
  actions: read
jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Yarn 1
        run: corepack prepare yarn@1.22.22 --activate
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version
        id: bump
        run: |
          npm version "${{ github.event.inputs.release_type }}" -m "chore(release): %s"
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Push commit and tag
        run: |
          git push
          git push --tags
  build-installers:
    needs: bump-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_script: dist:linux
          - os: windows-latest
            build_script: dist:win
          - os: macos-latest
            build_script: dist:mac
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump-version.outputs.tag }}
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Yarn 1
        run: corepack prepare yarn@1.22.22 --activate
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Build installers
        run: yarn ${{ matrix.build_script }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.os }}
          path: release/**
  publish-release:
    needs:
      - bump-version
      - build-installers
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
      - name: Download artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${{ github.run_id }}" --repo "${{ github.repository }}" --dir artifacts
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.bump-version.outputs.tag }}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes
          find artifacts -type f -print0 | xargs -0 gh release upload "$TAG" --clobber
