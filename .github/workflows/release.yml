name: Release
on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
permissions:
  contents: write
  actions: read
jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Yarn 1
        run: corepack prepare yarn@1.22.22 --activate
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump version
        id: bump
        run: |
          npm version "${{ github.event.inputs.release_type }}" -m "chore(release): %s"
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
      - name: Push commit and tag
        run: |
          git push
          git push --tags
  build-installers:
    needs: bump-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_script: dist:linux:deb
          - os: windows-latest
            build_script: dist:win
          - os: macos-latest
            build_script: dist:mac
    steps:
      - name: Checkout tag
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.bump-version.outputs.tag }}
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 26
      - name: Enable Corepack
        run: corepack enable
      - name: Setup Yarn 1
        run: corepack prepare yarn@1.22.22 --activate
      - name: Install dependencies
        run: yarn install --frozen-lockfile
      - name: Import Apple code-signing certificate
        if: matrix.os == 'macos-latest'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_P12_PASSWORD }}
      - name: Verify macOS signing secrets
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          [ -n "$APPLE_ID" ] || { echo 'Missing APPLE_ID secret'; exit 1; }
          [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] || { echo 'Missing APPLE_APP_SPECIFIC_PASSWORD secret'; exit 1; }
          [ -n "$APPLE_TEAM_ID" ] || { echo 'Missing APPLE_TEAM_ID secret'; exit 1; }
      - name: Build installers
        if: matrix.os != 'macos-latest'
        run: yarn ${{ matrix.build_script }}
      - name: Build installers (macOS)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: yarn ${{ matrix.build_script }}
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.os }}
          path: release/**
  publish-release:
    needs:
      - bump-version
      - build-installers
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh run download "${{ github.run_id }}" --repo "${{ github.repository }}" --dir artifacts
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.bump-version.outputs.tag }}"
          REPO="${{ github.repository }}"
          VERSION="${TAG#v}"
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 || gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes

          LINUX_FILE="$(find artifacts -type f -iname '*.deb' | head -n 1)"
          WINDOWS_FILE="$(find artifacts -type f -iname '*setup*.exe' | head -n 1)"
          MAC_FILE="$(find artifacts -type f -iname '*.dmg' | head -n 1)"

          [ -n "$LINUX_FILE" ] || { echo 'Missing Linux deb'; find artifacts -type f; exit 1; }
          [ -n "$WINDOWS_FILE" ] || { echo 'Missing Windows Setup EXE'; find artifacts -type f; exit 1; }
          [ -n "$MAC_FILE" ] || { echo 'Missing macOS DMG'; find artifacts -type f; exit 1; }

          mkdir -p release-upload
          LINUX_ASSET="release-upload/App.Blueprint-${VERSION}-linux.deb"
          WINDOWS_ASSET="release-upload/App.Blueprint-${VERSION}-windows.exe"
          MAC_ASSET="release-upload/App.Blueprint-${VERSION}-macos.dmg"

          cp "$LINUX_FILE" "$LINUX_ASSET"
          cp "$WINDOWS_FILE" "$WINDOWS_ASSET"
          cp "$MAC_FILE" "$MAC_ASSET"

          gh release upload "$TAG" "$LINUX_ASSET" --repo "$REPO" --clobber
          gh release upload "$TAG" "$WINDOWS_ASSET" --repo "$REPO" --clobber
          gh release upload "$TAG" "$MAC_ASSET" --repo "$REPO" --clobber
