name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false

  build_release:
    name: Build Release
    needs: create_release
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            release_suffix: ubuntu
            build_script: dist:linux
            release_files: |
              release/ubuntu/*.AppImage
              release/ubuntu/*.deb
          - os: macos-latest
            release_suffix: mac
            build_script: dist:mac
            release_files: |
              release/mac/*.dmg
          - os: windows-latest
            release_suffix: windows
            build_script: dist:win
            release_files: |
              release/windows/*.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn
        run: corepack prepare yarn@1.22.22 --activate

      - name: Prepare macOS signing certificate
        if: matrix.os == 'macos-latest'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "Missing secret: MACOS_CERTIFICATE_P12_BASE64"
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/macos-certificate.p12"
          python - <<'PY'
import base64
import os
from pathlib import Path

certificate = os.environ["BUILD_CERTIFICATE_BASE64"]
target = Path(os.environ["RUNNER_TEMP"]) / "macos-certificate.p12"
target.write_bytes(base64.b64decode(certificate))
PY

          echo "CSC_LINK=file://$CERT_PATH" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build release package
        env:
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: yarn ${{ matrix.build_script }}

      - name: Notarize and staple macOS artifacts
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "Missing Apple notarization secrets (APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID)"
            exit 1
          fi

          shopt -s nullglob
          files=(release/mac/*.dmg)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No DMG files found in release/mac"
            exit 1
          fi

          for dmg in "${files[@]}"; do
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
          done

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.release_files }}
          fail_on_unmatched_files: true

