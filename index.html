<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App Blueprint</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 24px;
      }
      h1 {
        margin-top: 0;
      }
      .hello-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .panel {
        margin-top: 20px;
        padding: 16px;
        border: 1px solid #d0d0d0;
        border-radius: 8px;
        width: 320px;
      }
      button {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #767676;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Hello World App</h1>
    <div class="hello-list">
      <span>Hello World</span>
      <span>Hello TypeScript</span>
      <span>Hello Cross Platform</span>
    </div>
    <div class="panel">
      <p><strong>Current time:</strong> <span id="time">--:--:--</span></p>
      <p><strong>Status:</strong> <span id="status">Updated 0 times</span></p>
      <button id="update-button" type="button">Update something</button>
    </div>
    <script src="./dist/renderer.js"></script>
  </body>
</html>
